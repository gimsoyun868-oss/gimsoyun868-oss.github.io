<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>김소윤 이력서 PDF</title>
  <style>
    :root { --bg:#f7f7f4; --paper:#fff; --ink:#1f2933; --muted:#667085; --line:#d9dee6; --accent:#143f6b; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Segoe UI", Arial, sans-serif; font-size: 15px; line-height: 1.65; }
    header { max-width: 1040px; margin: 0 auto; padding: 28px 20px 18px; display: flex; justify-content: space-between; gap: 18px; align-items: flex-start; border-bottom: 1px solid var(--line); }
    h1 { margin: 0 0 4px; font-size: 24px; line-height: 1.25; }
    p { margin: 0; color: var(--muted); }
    a, button { font: inherit; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .button { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 7px 14px; border: 1px solid var(--accent); border-radius: 8px; background: var(--accent); color: #fff; font-weight: 700; cursor: pointer; text-decoration: none; }
    .button.secondary { background: var(--paper); color: var(--accent); }
    .pages { width: min(960px, calc(100% - 32px)); margin: 22px auto 46px; display: grid; gap: 18px; }
    .page { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; box-shadow: 0 8px 22px rgba(31, 41, 51, 0.08); }
    .page img { display: block; width: 100%; height: auto; }
    @media (max-width: 720px) { header { flex-direction: column; } .actions { justify-content: flex-start; } .pages { width: calc(100% - 18px); gap: 12px; } }
    @media print {
      body { background: #fff; }
      header { display: none; }
      .pages { width: 100%; margin: 0; gap: 0; }
      .page { border: 0; border-radius: 0; box-shadow: none; page-break-after: always; }
      .page img { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>김소윤 이력서 PDF</h1>
      <p>PDF 문서를 브라우저에서 바로 볼 수 있도록 이미지로 렌더링한 제출용 화면입니다.</p>
      <a href="./">웹 이력서로 돌아가기</a>
    </div>
    <div class="actions">
      <button class="button" type="button" onclick="window.print()">인쇄 / PDF 저장</button>
      <a class="button secondary" href="./">웹 이력서</a>
    </div>
  </header>
